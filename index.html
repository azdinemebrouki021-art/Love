<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Cookie 💗</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
overflow:hidden;
background:linear-gradient(-45deg,#ffb6c1,#ffc0cb,#ff9ecf,#ffd6e7);
background-size:400% 400%;
animation:bg 10s ease infinite;
color:white;
text-align:center;
height:100vh;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.page{
display:none;
width:100%;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
padding:20px;
}

.active{
display:flex;
}

.envelope{
font-size:120px;
animation:float 2s infinite;
}

@keyframes float{
50%{transform:translateY(-10px);}
}

input{
padding:12px;
border:none;
border-radius:20px;
margin-top:15px;
text-align:center;
font-size:18px;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:20px;
background:white;
color:#ff4f8b;
font-weight:bold;
font-size:18px;
cursor:pointer;
}

.hearts{
position:fixed;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
}

.heart{
position:absolute;
bottom:-30px;
font-size:20px;
animation:up 6s linear infinite;
}

@keyframes up{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-110vh);
opacity:0;
}
}

#flowerScreen{
position:fixed;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
font-size:40px;
background:url('https://images.unsplash.com/photo-1490750967868-88aa4486c946?q=80&w=1200') center/cover;
z-index:999;
animation:fadeOut 4s forwards;
}

@keyframes fadeOut{
0%{opacity:1;}
70%{opacity:1;}
100%{
opacity:0;
visibility:hidden;
}
}

.message{
max-width:700px;
font-size:22px;
line-height:1.8;
white-space:pre-wrap;
}

.bigHeart{
font-size:120px;
animation:beat 1s infinite;
}

@keyframes beat{
50%{
transform:scale(1.2);
}
}
</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<div id="flowerScreen">
🌹💗🌹💗🌹
</div>

<!-- الصفحة الأولى -->
<div class="page active" id="page1">

<div class="envelope">💌</div>

<h2>عندي حاجة صغيرة حبيت نهديهالك 🙂…</h2>

<input type="password" id="code" placeholder="أدخل الرمز السري">

<button onclick="openGift()">فتح الهدية 💗</button>

</div>

<!-- الرسالة -->
<div class="page" id="page2">

<div class="message" id="typing"></div>

<button onclick="nextPage()">Next ➜</button>

</div>

<!-- الصفحة الثانية -->
<div class="page" id="page3">

<h1>بدايتنا 💗</h1>

<br>

<h2>2025 / 05 / 07</h2>

<br><br>

<h2 id="line1"></h2>

<div id="counter"></div>

<button onclick="lastPage()">💞</button>

</div>

<!-- الأخيرة -->
<div class="page" id="page4">

<div class="bigHeart">❤️</div>

<br>

<h2>
مهما نكتب ما نوصفش قداش نحبك،
وهاد الموقع غير حاجة صغيرة باش نفرحك لانو تستاهلي ما اكثر💗
</h2>

<br>

<h1>Forever ♾️❤️</h1>

<br>

<h2>ثانيكووو على كل حاجة 😊💗</h2>

<br>

<h3>تصميم: عزوشك💗</h3>

</div>

<script>

for(let i=0;i<35;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="💗";
h.style.left=Math.random()*100+"%";
h.style.animationDuration=(4+Math.random()*5)+"s";
document.getElementById("hearts").appendChild(h);
}

const msg=`حبيت نديرلك هدية جديدة صغيرة ياسر ياسر ههههه💗

قبل أي حاجة حابك تعرفي أني نحبك وياربي يخليك ليا يا قلبي، يا سندي وحياتي وقاع وش كاين ❤️

نوعدك نوصلو وين رانا حابين وندييييرو قاع وش في رانا حابيين نوصلو صراحة هادي هدية صغييرة💗💗🫶🏼 وهيا في صح ولله تستاهلي ماكثر حبيت نفرحك بهادي كادو صغيير ههه

Ilovve u cooooki myy little girl💗`;

function openGift(){

if(document.getElementById("code").value!="3zzcooki"){
alert("الرمز السري خاطئ 💔");
return;
}

document.getElementById("flowerScreen").style.display="flex";

setTimeout(()=>{

document.getElementById("page1").classList.remove("active");
document.getElementById("page2").classList.add("active");

let i=0;

let timer=setInterval(()=>{
document.getElementById("typing").innerHTML+=msg.charAt(i);
i++;

if(i>=msg.length){
clearInterval(timer);
}

},40);

},3500);

}

function nextPage(){

document.getElementById("page2").classList.remove("active");
document.getElementById("page3").classList.add("active");

setTimeout(()=>{
document.getElementById("line1").innerHTML="ولله صح ليام يفوتو يجروووو 🙂💗";
},1000);

updateCounter();
setInterval(updateCounter,60000);

}

function updateCounter(){

let start=new Date("2025-05-07");
let now=new Date();

let diff=now-start;

let days=Math.floor(diff/(1000*60*60*24));
let hours=Math.floor(diff/(1000*60*60));
let mins=Math.floor(diff/(1000*60));

document.getElementById("counter").innerHTML=
`
<br><br>
من نهار 07/05/2025 إلى اليوم:<br><br>

❤️ عدد الأيام: ${days}<br>
❤️ عدد الساعات: ${hours}<br>
❤️ عدد الدقائق: ${mins}<br><br>

💗 حرفيا كل دقيقة معاك رزق
`;

}

function lastPage(){

document.getElementById("page3").classList.remove("active");
document.getElementById("page4").classList.add("active");

}

</script>

</body>
</html>
